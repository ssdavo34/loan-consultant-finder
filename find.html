function search(){

  if(fn!=='전체')d=d.filter(c=>c.t===fn);

<div class="consultant-card">
<div class="d-flex justify-content-between align-items-start mb-2">
<div><span class="consultant-name">${c.n}</span><span class="consultant-badge ms-2">${c.t}</span></div>
<button class="btn-call btn" onclick="alert('연락처: ${c.p}\n실제 서비스에서는 전화 연결됩니다.')"><i class="fas fa-phone me-1"></i>연락하기</button>

<div class="consultant-info">

<div><i class="fas fa-map-marker-alt me-2 text-primary"></i>${c.r} ${c.d}</div>
<div><i class="fas fa-id-card me-2 text-primary"></i>등록번호: ${c.c}</div>
<div><i class="fas fa-clock me-2 text-primary"></i>경력: ${c.y} | 전문: ${c.spec}</div>
<div class="mt-2 p-2 bg-light rounded small text-muted">"<em>${c.intro}</em>"</div>
</div>
<div class="mt-2"><small class="text-muted"><i class="fas fa-exclamation-circle me-1 text-warning"></i>상담 전 은행연합회에서 신원 확인을 권장합니다.</small></div>
<div class="mt-2 business-card" style="font-size:.82rem;padding:14px">
<div class="fw-bold fs-6">${c.n} 상담사</div>
<div class="opacity-75">${c.f} | ${c.r} ${c.d}</div>
<div class="mt-1"><i class="fas fa-phone me-1"></i>${c.p} &nbsp;|&nbsp; 등록: ${c.c}</div>
<div class="opacity-60 small mt-1">경력 ${c.y} | ${c.spec}</div>
</div>
</div>
</div>`).join('');
